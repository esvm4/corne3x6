# Configuration file for Corne keyboard running ZMK firmware
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# Configure encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Configure BLE transmit power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fix battery reporting issue on Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Configure OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Configure power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_IDLE_TIMEOUT=1800000

# Configure wakeup
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_USB=y

# Configure ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# Configure RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Automatically turn off RGB when idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Improve BLE connection stability
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Optimise logging
CONFIG_ZMK_USB_LOGGING=n

# Clear bonds on start
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
